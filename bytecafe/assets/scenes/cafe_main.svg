<svg viewBox="0 0 400 110" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- rain drop path reused -->
      <line id="rd" x1="0" y1="0" x2="-3" y2="14" stroke="#2a4a6a" stroke-width="0.7" opacity="0.55"/>
    </defs>
    <rect width="400" height="110" fill="#080600"/>
    <!-- floor -->
    <rect x="0" y="85" width="400" height="25" fill="#0d0900"/>
    <!-- back wall -->
    <rect x="0" y="20" width="400" height="65" fill="#0a0700"/>

    <!-- === RAIN WINDOW LEFT === -->
    <rect x="10" y="22" width="60" height="45" fill="#060c14" rx="1"/>
    <rect x="10" y="22" width="60" height="45" fill="#e82050" opacity="0.04"/>
    <!-- rain group animated -->
    <g>
      <line x1="22" y1="22" x2="19" y2="58" stroke="#2a4a6a" stroke-width="0.7" opacity="0.6"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,20;0,0" dur="1.1s" repeatCount="indefinite"/>
    </g>
    <g>
      <line x1="33" y1="18" x2="30" y2="62" stroke="#2a4a6a" stroke-width="0.5" opacity="0.4"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,20;0,0" dur="1.4s" begin="-0.3s" repeatCount="indefinite"/>
    </g>
    <g>
      <line x1="44" y1="22" x2="41" y2="62" stroke="#2a4a6a" stroke-width="0.7" opacity="0.65"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,20;0,0" dur="0.95s" begin="-0.6s" repeatCount="indefinite"/>
    </g>
    <g>
      <line x1="55" y1="20" x2="52" y2="60" stroke="#2a4a6a" stroke-width="0.5" opacity="0.35"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,20;0,0" dur="1.25s" begin="-0.9s" repeatCount="indefinite"/>
    </g>
    <g>
      <line x1="64" y1="25" x2="61" y2="65" stroke="#2a4a6a" stroke-width="0.6" opacity="0.5"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,20;0,0" dur="1.05s" begin="-0.2s" repeatCount="indefinite"/>
    </g>
    <!-- clip rain to window -->
    <rect x="10" y="22" width="60" height="45" fill="none" stroke="#2a1800" stroke-width="2"/>
    <line x1="40" y1="22" x2="40" y2="67" stroke="#2a1800" stroke-width="1"/>
    <line x1="10" y1="44" x2="70" y2="44" stroke="#2a1800" stroke-width="1"/>

    <!-- counter -->
    <rect x="100" y="60" width="300" height="8" fill="#1a1200"/>
    <rect x="100" y="68" width="300" height="17" fill="#140e00"/>

    <!-- === CRT MONITOR 1 — amber flickering === -->
    <rect x="120" y="38" width="32" height="24" fill="#1a1200" rx="2"/>
    <rect x="123" y="41" width="26" height="18" fill="#0d0900"/>
    <rect x="124" y="42" width="24" height="16" fill="#e8a020" opacity="0.65">
      <animate attributeName="opacity" values="0.65;0.5;0.7;0.55;0.68;0.5;0.65" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <!-- text lines on monitor -->
    <rect x="126" y="44" width="14" height="1" fill="#e8a020" opacity="0.8"/>
    <rect x="126" y="47" width="18" height="1" fill="#e8a020" opacity="0.6"/>
    <rect x="126" y="50" width="10" height="1" fill="#e8a020" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7;0.7;0;0.7" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="60" width="32" height="3" fill="#0d0900"/>
    <rect x="130" y="63" width="12" height="2" fill="#0d0900"/>

    <!-- === CRT MONITOR 2 — green === -->
    <rect x="190" y="35" width="32" height="24" fill="#1a1200" rx="2"/>
    <rect x="193" y="38" width="26" height="18" fill="#0d0900"/>
    <rect x="194" y="39" width="24" height="16" fill="#4fc45a" opacity="0.45">
      <animate attributeName="opacity" values="0.45;0.38;0.5;0.42;0.45" dur="4.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="190" y="57" width="32" height="3" fill="#0d0900"/>
    <rect x="200" y="60" width="12" height="2" fill="#0d0900"/>

    <!-- === CRT MONITOR 3 — amber dim === -->
    <rect x="270" y="40" width="32" height="24" fill="#1a1200" rx="2"/>
    <rect x="273" y="43" width="26" height="18" fill="#0d0900"/>
    <rect x="274" y="44" width="24" height="16" fill="#e8a020" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.28;0.4;0.33;0.35" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect x="270" y="62" width="32" height="3" fill="#0d0900"/>

    <!-- === NEON SIGN — pulsing === -->
    <rect x="330" y="22" width="62" height="16" fill="#1a0808" rx="1"/>
    <text x="336" y="33" font-family="monospace" font-size="8" fill="#e82050">
      BYTE/CAFÉ
      <animate attributeName="opacity" values="0.9;0.6;0.95;0.5;0.9;0.85;0.9" dur="2.8s" repeatCount="indefinite"/>
    </text>
    <!-- neon glow flicker -->
    <rect x="328" y="20" width="66" height="20" fill="#e82050" rx="2">
      <animate attributeName="opacity" values="0.06;0.03;0.08;0.02;0.07;0.04;0.06" dur="2.8s" repeatCount="indefinite"/>
    </rect>

    <!-- ambient floor glow -->
    <rect x="0" y="85" width="400" height="25" fill="#e8a020" opacity="0.015"/>
  </svg>