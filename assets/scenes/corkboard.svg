<svg viewBox="0 0 400 110" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="110" fill="#0a0700"/>
    <!-- corkboard -->
    <rect x="30" y="8" width="340" height="90" fill="#2a1a08" rx="2"/>
    <rect x="33" y="11" width="334" height="84" fill="#1e1408" rx="1"/>
    <!-- cork texture -->
    <rect x="40" y="18" width="2" height="2" fill="#3a2810" opacity="0.6"/>
    <rect x="60" y="25" width="2" height="2" fill="#3a2810" opacity="0.5"/>
    <rect x="80" y="15" width="2" height="2" fill="#3a2810" opacity="0.7"/>
    <rect x="100" y="30" width="2" height="2" fill="#3a2810" opacity="0.4"/>
    <rect x="320" y="20" width="2" height="2" fill="#3a2810" opacity="0.6"/>
    <rect x="340" y="35" width="2" height="2" fill="#3a2810" opacity="0.5"/>

    <!-- === NOTE 1 pizza flyer — very slight sway === -->
    <g transform-origin="72 15">
      <rect x="42" y="18" width="70" height="50" fill="#d8c890" rx="1" transform="rotate(-3,42,18)"/>
      <rect x="44" y="20" width="66" height="46" fill="#c8b880" rx="1" transform="rotate(-3,42,18)"/>
      <rect x="72" y="15" width="5" height="5" fill="#c03010" rx="2"/>
      <animateTransform attributeName="transform" type="rotate" values="0,72,38;0.4,72,38;0,72,38;-0.3,72,38;0,72,38" dur="6s" repeatCount="indefinite"/>
    </g>

    <!-- === NOTE 2 study group — gentle flutter === -->
    <g>
      <rect x="140" y="14" width="90" height="40" fill="#e8e0c0" rx="1" transform="rotate(2,140,14)"/>
      <rect x="183" y="11" width="5" height="5" fill="#4fc45a" rx="2"/>
      <rect x="148" y="22" width="74" height="2" fill="#4a3810" opacity="0.7" transform="rotate(2,140,14)"/>
      <rect x="148" y="27" width="60" height="2" fill="#4a3810" opacity="0.5" transform="rotate(2,140,14)"/>
      <rect x="148" y="32" width="68" height="2" fill="#4a3810" opacity="0.5" transform="rotate(2,140,14)"/>
      <rect x="148" y="37" width="50" height="2" fill="#4a3810" opacity="0.4" transform="rotate(2,140,14)"/>
      <animateTransform attributeName="transform" type="rotate" values="0,185,32;-0.5,185,32;0,185,32;0.4,185,32;0,185,32" dur="7.5s" begin="-2s" repeatCount="indefinite"/>
    </g>

    <!-- === NOTE 3 lost cat poster === -->
    <g>
      <rect x="260" y="20" width="65" height="70" fill="#f0e8d0" rx="1" transform="rotate(-1,260,20)"/>
      <rect x="287" y="17" width="5" height="5" fill="#e8a020" rx="2"/>
      <rect x="268" y="28" width="48" height="2" fill="#3a2810" opacity="0.8" transform="rotate(-1,260,20)"/>
      <rect x="268" y="34" width="40" height="2" fill="#3a2810" opacity="0.5" transform="rotate(-1,260,20)"/>
      <rect x="275" y="42" width="32" height="28" fill="#c8a870" rx="2" transform="rotate(-1,260,20)"/>
      <rect x="273" y="38" width="8" height="8" fill="#c8a870" rx="1" transform="rotate(-1,260,20)"/>
      <rect x="295" y="38" width="8" height="8" fill="#c8a870" rx="1" transform="rotate(-1,260,20)"/>
      <animateTransform attributeName="transform" type="rotate" values="0,289,56;0.6,289,56;0,289,56;-0.4,289,56;0,289,56" dur="5s" begin="-1s" repeatCount="indefinite"/>
    </g>

    <!-- === NOTE 4 hockey printout === -->
    <g>
      <rect x="50" y="72" width="80" height="25" fill="#e0d8c0" rx="1" transform="rotate(1,50,72)"/>
      <rect x="87" y="69" width="5" height="5" fill="#c03010" rx="2"/>
      <rect x="56" y="78" width="65" height="2" fill="#2a1808" opacity="0.7" transform="rotate(1,50,72)"/>
      <rect x="56" y="83" width="50" height="2" fill="#2a1808" opacity="0.5" transform="rotate(1,50,72)"/>
      <rect x="56" y="88" width="58" height="2" fill="#2a1808" opacity="0.4" transform="rotate(1,50,72)"/>
      <animateTransform attributeName="transform" type="rotate" values="0,90,85;-0.4,90,85;0,90,85;0.5,90,85;0,90,85" dur="8s" begin="-3s" repeatCount="indefinite"/>
    </g>

    <!-- pushpins -->
    <rect x="131" y="65" width="4" height="4" fill="#e82050" rx="2"/>
    <rect x="235" y="18" width="4" height="4" fill="#2050e8" rx="2"/>
    <rect x="355" y="72" width="4" height="4" fill="#e8a020" rx="2"/>
    <!-- frame -->
    <rect x="30" y="8" width="340" height="90" fill="none" stroke="#3a2810" stroke-width="3" rx="2"/>
  </svg>