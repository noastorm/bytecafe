<svg viewBox="0 0 400 110" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="110" fill="#060400"/>
    <!-- desk -->
    <rect x="0" y="72" width="400" height="38" fill="#0a0800"/>
    <rect x="0" y="72" width="400" height="3" fill="#1a1200"/>

    <!-- === CRT MONITOR BODY === -->
    <rect x="110" y="10" width="180" height="130" fill="#1e1600" rx="6"/>
    <rect x="115" y="15" width="170" height="120" fill="#161000" rx="4"/>
    <rect x="122" y="20" width="156" height="100" fill="#0d0a00" rx="2"/>

    <!-- === AMBER SCREEN — flickering === -->
    <rect x="126" y="24" width="148" height="92" rx="1">
      <animate attributeName="fill" values="#e8a020;#e8a020;#d89018;#e8a020;#eeaa24;#e8a020" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.11;0.09;0.13;0.10;0.12;0.11" dur="4.5s" repeatCount="indefinite"/>
    </rect>

    <!-- screen text lines -->
    <rect x="132" y="32" width="80" height="2" fill="#e8a020" opacity="0.7"/>
    <rect x="132" y="38" width="110" height="2" fill="#e8a020" opacity="0.5"/>
    <rect x="132" y="44" width="60" height="2" fill="#e8a020" opacity="0.6"/>
    <rect x="132" y="50" width="90" height="2" fill="#e8a020" opacity="0.45"/>
    <rect x="132" y="56" width="100" height="2" fill="#e8a020" opacity="0.5"/>
    <!-- new line typing in -->
    <rect x="132" y="62" width="40" height="2" fill="#e8a020" opacity="0.8">
      <animate attributeName="width" values="0;40;40;40;0;0" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- === BLINKING CURSOR === -->
    <rect x="174" y="62" width="6" height="8" fill="#e8a020">
      <animate attributeName="opacity" values="1;1;0;0;1;1;0;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <!-- scanline sweep -->
    <rect x="126" y="24" width="148" height="6" fill="#e8a020" opacity="0.06">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,92;0,92" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- monitor stand -->
    <rect x="176" y="130" width="48" height="8" fill="#1a1200"/>
    <rect x="156" y="136" width="88" height="5" fill="#161000"/>

    <!-- === KEYBOARD === -->
    <rect x="80" y="76" width="240" height="18" fill="#161000" rx="2"/>
    <rect x="84" y="78" width="232" height="14" fill="#0e0c00" rx="1"/>
    <rect x="88" y="80" width="220" height="3" fill="#1a1600" rx="1"/>
    <rect x="90" y="85" width="210" height="3" fill="#1a1600" rx="1"/>
    <rect x="92" y="90" width="200" height="3" fill="#1a1600" rx="1"/>
    <!-- sticky Q highlight -->
    <rect x="100" y="80" width="8" height="6" fill="#2a2000" rx="1"/>

    <!-- === COFFEE CUP + STEAM === -->
    <rect x="340" y="62" width="18" height="20" fill="#1a0a00" rx="2"/>
    <rect x="342" y="64" width="14" height="16" fill="#0a0600"/>
    <rect x="342" y="64" width="14" height="6" fill="#3a1800" opacity="0.6"/>
    <rect x="358" y="68" width="6" height="8" fill="none" stroke="#1a0a00" stroke-width="1.5"/>
    <!-- steam wisps -->
    <g opacity="0.45">
      <path d="M347,59 Q345,55 347,51" stroke="#4a3020" stroke-width="1" fill="none">
        <animate attributeName="opacity" values="0.45;0.2;0.45;0.35;0.45" dur="2.2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2.2s" repeatCount="indefinite"/>
      </path>
      <path d="M352,57 Q354,53 351,49" stroke="#4a3020" stroke-width="1" fill="none">
        <animate attributeName="opacity" values="0.3;0.45;0.2;0.4;0.3" dur="1.9s" begin="-0.6s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="1.9s" begin="-0.6s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- desk amber glow -->
    <rect x="80" y="72" width="240" height="4" fill="#e8a020" opacity="0.04"/>
  </svg>