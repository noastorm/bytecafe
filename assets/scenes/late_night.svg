<svg viewBox="0 0 400 110" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="110" fill="#040300"/>
    <rect x="0" y="80" width="400" height="30" fill="#060400"/>
    <rect x="0" y="80" width="400" height="2" fill="#0e0800"/>
    <rect x="0" y="15" width="400" height="65" fill="#060400"/>

    <!-- === RAIN WINDOW — dark night === -->
    <rect x="10" y="18" width="60" height="45" fill="#030810" rx="1"/>
    <rect x="10" y="18" width="60" height="45" fill="#e82050" opacity="0.025"/>
    <g>
      <line x1="22" y1="15" x2="19" y2="60" stroke="#1a2a3a" stroke-width="0.6" opacity="0.7"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,22;0,0" dur="1.0s" repeatCount="indefinite"/>
    </g>
    <g>
      <line x1="35" y1="12" x2="32" y2="64" stroke="#1a2a3a" stroke-width="0.5" opacity="0.45"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,22;0,0" dur="1.3s" begin="-0.4s" repeatCount="indefinite"/>
    </g>
    <g>
      <line x1="48" y1="18" x2="45" y2="63" stroke="#1a2a3a" stroke-width="0.6" opacity="0.65"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,22;0,0" dur="0.9s" begin="-0.7s" repeatCount="indefinite"/>
    </g>
    <g>
      <line x1="62" y1="16" x2="59" y2="61" stroke="#1a2a3a" stroke-width="0.4" opacity="0.35"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,22;0,0" dur="1.2s" begin="-0.2s" repeatCount="indefinite"/>
    </g>
    <rect x="10" y="18" width="60" height="45" fill="none" stroke="#180e00" stroke-width="2"/>
    <line x1="40" y1="18" x2="40" y2="63" stroke="#180e00" stroke-width="1"/>
    <line x1="10" y1="40" x2="70" y2="40" stroke="#180e00" stroke-width="1"/>

    <!-- === DESK LAMP — flickering light cone === -->
    <rect x="310" y="30" width="8" height="40" fill="#100c00"/>
    <rect x="306" y="28" width="16" height="6" fill="#1a1200" rx="1"/>
    <rect x="304" y="24" width="20" height="8" fill="#0e0a00" rx="2"/>
    <!-- light cone flicker -->
    <rect x="278" y="36" width="84" height="32" fill="#e8a020">
      <animate attributeName="opacity" values="0.055;0.04;0.065;0.05;0.07;0.045;0.055" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="288" y="40" width="64" height="22" fill="#e8a020">
      <animate attributeName="opacity" values="0.04;0.06;0.035;0.055;0.04;0.06;0.04" dur="3.5s" repeatCount="indefinite"/>
    </rect>

    <!-- === DISTANT MONITOR — slow pulse === -->
    <rect x="200" y="45" width="28" height="20" fill="#120e00" rx="1"/>
    <rect x="203" y="48" width="22" height="14" fill="#0a0800"/>
    <rect x="204" y="49" width="20" height="12" fill="#e8a020">
      <animate attributeName="opacity" values="0.28;0.22;0.32;0.25;0.28" dur="5s" repeatCount="indefinite"/>
    </rect>
    <!-- cursor blink on distant monitor -->
    <rect x="206" y="54" width="4" height="5" fill="#e8a020">
      <animate attributeName="opacity" values="0.8;0.8;0;0;0.8;0.8;0;0;0.8" dur="1.3s" repeatCount="indefinite"/>
    </rect>

    <!-- empty chairs silhouettes -->
    <rect x="145" y="72" width="24" height="8" fill="#0c0800" rx="1"/>
    <rect x="148" y="65" width="18" height="9" fill="#0a0700" rx="1"/>
    <rect x="148" y="74" width="4" height="8" fill="#0a0700"/>
    <rect x="162" y="74" width="4" height="8" fill="#0a0700"/>
    <rect x="230" y="72" width="24" height="8" fill="#0c0800" rx="1"/>
    <rect x="233" y="65" width="18" height="9" fill="#0a0700" rx="1"/>
    <rect x="233" y="74" width="4" height="8" fill="#0a0700"/>
    <rect x="247" y="74" width="4" height="8" fill="#0a0700"/>

    <rect x="0" y="80" width="400" height="30" fill="#e8a020" opacity="0.008"/>
  </svg>